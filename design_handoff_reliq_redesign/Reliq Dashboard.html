<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reliq — Freight ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
<link rel="stylesheet" href="assets/reliq/styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data must be plain JS (loaded first) -->
<script src="assets/reliq/data.js"></script>

<!-- Tweaks panel starter (defines useTweaks, TweaksPanel, controls) -->
<script type="text/babel" src="assets/tweaks-panel.jsx"></script>

<!-- components must load before pages reference them -->
<script type="text/babel" src="assets/reliq/components.jsx"></script>
<script type="text/babel" src="assets/reliq/pages-dashboard.jsx"></script>
<script type="text/babel" src="assets/reliq/pages-ops.jsx"></script>
<script type="text/babel" src="assets/reliq/pages-finance.jsx"></script>
<script type="text/babel" src="assets/reliq/pages-crm.jsx"></script>
<script type="text/babel" src="assets/reliq/shell.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "default",
  "accent": "#FF7A45",
  "showSwitcher": true
}/*EDITMODE-END*/;

const ACCENT_OPTIONS = [
  '#FF7A45',  // Reliq orange (default)
  '#2563EB',  // Cobalt blue
  '#10B981',  // Emerald
  '#7C3AED',  // Violet
  '#0F172A',  // Midnight
];

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPageState] = useState('dashboard');
  const [params, setParams] = useState(null);
  const [dashVariant, setDashVariant] = useState('v1');

  const setPage = (p, params) => {
    setPageState(p);
    setParams(params || null);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  // Apply accent to css var
  useEffect(() => {
    document.documentElement.style.setProperty('--brand', tweaks.accent);
    // derive --brand-2 / --brand-3 from accent
    const hex = tweaks.accent.replace('#', '');
    const r = parseInt(hex.substr(0, 2), 16);
    const g = parseInt(hex.substr(2, 2), 16);
    const b = parseInt(hex.substr(4, 2), 16);
    document.documentElement.style.setProperty('--brand-2', `rgb(${Math.max(0, r-20)}, ${Math.max(0, g-20)}, ${Math.max(0, b-20)})`);
    document.documentElement.style.setProperty('--brand-3', `rgba(${r}, ${g}, ${b}, 0.14)`);
  }, [tweaks.accent]);

  // Figure out which top-nav section is active
  const D = window.ReliqData;
  const currentTopNav = D.TOP_NAV.find(t => t.pages.includes(page))?.key || 'overview';

  return (
    <>
      <Shell
        page={page}
        params={params}
        setPage={setPage}
        currentTopNav={currentTopNav}
        theme={tweaks.theme}
        density={tweaks.density}
        dashVariant={dashVariant}
      />

      {/* Dashboard variation switcher — only on dashboard */}
      {page === 'dashboard' && tweaks.showSwitcher && (
        <div className="dash-switcher">
          <button className={dashVariant === 'v1' ? 'active' : ''} onClick={() => setDashVariant('v1')}>V1 · Operations</button>
          <button className={dashVariant === 'v2' ? 'active' : ''} onClick={() => setDashVariant('v2')}>V2 · Finance</button>
          <button className={dashVariant === 'v3' ? 'active' : ''} onClick={() => setDashVariant('v3')}>V3 · Bento</button>
        </div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme">
          <TweakRadio
            label="Mode"
            value={tweaks.theme}
            onChange={(v) => setTweak('theme', v)}
            options={[
              { value: 'light', label: 'Light' },
              { value: 'dark',  label: 'Dark' },
            ]}
          />
          <TweakColor
            label="Accent"
            value={tweaks.accent}
            onChange={(v) => setTweak('accent', v)}
            options={ACCENT_OPTIONS}
          />
        </TweakSection>

        <TweakSection label="Density">
          <TweakRadio
            label="Spacing"
            value={tweaks.density}
            onChange={(v) => setTweak('density', v)}
            options={[
              { value: 'compact', label: 'Compact' },
              { value: 'default', label: 'Default' },
              { value: 'roomy',   label: 'Roomy' },
            ]}
          />
        </TweakSection>

        {page === 'dashboard' && (
          <TweakSection label="Dashboard">
            <TweakSelect
              label="Variant"
              value={dashVariant}
              onChange={setDashVariant}
              options={[
                { value: 'v1', label: 'V1 — Operations First' },
                { value: 'v2', label: 'V2 — Finance First (Finexy-style)' },
                { value: 'v3', label: 'V3 — Bento Dense' },
              ]}
            />
            <TweakToggle
              label="Show floating switcher"
              value={tweaks.showSwitcher}
              onChange={(v) => setTweak('showSwitcher', v)}
            />
          </TweakSection>
        )}

        <TweakSection label="Navigate">
          <TweakSelect
            label="Jump to page"
            value={page}
            onChange={(p) => setPage(p)}
            options={[
              { value: 'dashboard',  label: 'Dashboard' },
              { value: 'shipments',  label: 'Shipments' },
              { value: 'shipment',   label: 'Shipment Detail' },
              { value: 'pipeline',   label: 'Pipeline' },
              { value: 'tasks',      label: 'Tasks' },
              { value: 'invoices',   label: 'Invoices' },
              { value: 'ar',         label: 'AR Portal' },
              { value: 'ap',         label: 'AP Portal' },
              { value: 'collections',label: 'Collections' },
              { value: 'gl',         label: 'General Ledger' },
              { value: 'clients',    label: 'Clients' },
              { value: 'client',     label: 'Client 360' },
              { value: 'rates',      label: 'Rate Search' },
              { value: 'analytics',  label: 'Analytics' },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
